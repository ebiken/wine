<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WineDb — {% block title %}{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍷</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ request.url_for('static', path='app.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
  <div class="d-flex">
    <nav class="sidebar d-flex flex-column p-3 flex-shrink-0">
      <a class="text-white text-decoration-none mb-4 d-block" href="/ui/wines">
        <h5 class="mb-0">🍷 WineDb</h5>
      </a>
      <ul class="nav nav-pills flex-column gap-1">
        <li class="nav-item">
          <a class="nav-link {% if '/ui/grape-varieties' in request.url.path %}active{% endif %}" href="/ui/grape-varieties">Grape Varieties</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/ava' in request.url.path %}active{% endif %}" href="/ui/ava">AVAs</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/persons' in request.url.path %}active{% endif %}" href="/ui/persons">Persons</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/vineyards' in request.url.path %}active{% endif %}" href="/ui/vineyards">Vineyards</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/wineries' in request.url.path %}active{% endif %}" href="/ui/wineries">Wineries</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/wines' in request.url.path %}active{% endif %}" href="/ui/wines">Wines</a>
        </li>
        <li class="nav-item mt-2 pt-2 border-top border-secondary">
          <span class="small text-secondary px-2 d-block mb-1">Associations</span>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/winery-staff' in request.url.path %}active{% endif %}" href="/ui/winery-staff">Winery staff</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/vineyard-owners' in request.url.path %}active{% endif %}" href="/ui/vineyard-owners">Vineyard owners</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/wine-vineyard-sources' in request.url.path %}active{% endif %}" href="/ui/wine-vineyard-sources">Wine sources</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/ui/wine-grape-varieties' in request.url.path %}active{% endif %}" href="/ui/wine-grape-varieties">Wine blends</a>
        </li>
      </ul>
      <div class="mt-auto pt-3 border-top border-secondary">
        <a href="/docs" class="text-secondary text-decoration-none small" target="_blank">API Docs ↗</a>
      </div>
    </nav>

    <main class="flex-grow-1 p-4">
      <div id="flash-container">{% block flash %}{% endblock %}</div>
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="modal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Close modal when server sends HX-Trigger: closeModal
    document.body.addEventListener("closeModal", function () {
      document.getElementById("modal-container").innerHTML = "";
    });
  </script>
</body>
</html>
