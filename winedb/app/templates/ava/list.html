{% extends "base.html" %}
{% block title %}AVAs{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">American Viticultural Areas</h2>
  <div class="d-flex align-items-center gap-2">
    <div class="btn-group btn-group-sm" role="group">
      <a href="/ui/ava" class="btn btn-outline-secondary active">List</a>
      <a href="/ui/ava/graph" class="btn btn-outline-secondary">Tree</a>
    </div>
    <button class="btn btn-primary btn-sm"
          hx-get="/ui/ava/modal/new"
          hx-target="#modal-container"
          hx-swap="innerHTML">+ New</button>
  </div>
</div>

<form id="ava-filter-form"
      hx-get="/ui/ava/rows"
      hx-target="#ava-table-wrap"
      hx-trigger="input delay:300ms"
      class="row g-2 mb-3 align-items-end">
  <input type="hidden" id="ava-sort-by"  name="sort_by"  value="{{ sort_by }}">
  <input type="hidden" id="ava-sort-dir" name="sort_dir" value="{{ sort_dir }}">
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Name</label>
    <input type="text" name="name" class="form-control form-control-sm" placeholder="Search…" style="min-width:140px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">State</label>
    <input type="text" name="state" class="form-control form-control-sm" placeholder="e.g. CA" style="width:80px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">County</label>
    <input type="text" name="county" class="form-control form-control-sm" placeholder="Search…" style="min-width:120px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Parent AVA</label>
    <select name="parent_ava_id" class="form-select form-select-sm" style="min-width:160px">
      <option value="">All</option>
      {% for a in all_avas %}
      <option value="{{ a.id }}">{{ a.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <button type="button" class="btn btn-outline-secondary btn-sm"
            onclick="this.form.reset(); htmx.trigger(this.form, 'input');">Clear</button>
  </div>
</form>

<div id="ava-table-wrap">
  {% include "ava/_table.html" %}
</div>
{% endblock %}
