{% extends "base.html" %}
{% block title %}Wines{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Wines</h2>
  <button class="btn btn-primary btn-sm"
          hx-get="/ui/wines/modal/new"
          hx-target="#modal-container"
          hx-swap="innerHTML">+ New</button>
</div>

<form id="wine-filter-form"
      hx-get="/ui/wines/rows"
      hx-target="#wine-table-wrap"
      hx-trigger="input delay:300ms"
      class="row g-2 mb-3 align-items-end">
  <input type="hidden" id="wine-sort-by"  name="sort_by"  value="{{ sort_by }}">
  <input type="hidden" id="wine-sort-dir" name="sort_dir" value="{{ sort_dir }}">
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Label</label>
    <input type="text" name="label_name" class="form-control form-control-sm" placeholder="Search…" style="min-width:140px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Winery</label>
    <select name="winery_id" class="form-select form-select-sm" style="min-width:140px">
      <option value="">All</option>
      {% for w in wineries %}
      <option value="{{ w.id }}">{{ w.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Vintage</label>
    <input type="number" name="vintage_year" class="form-control form-control-sm" placeholder="e.g. 2021" style="width:100px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Grape Variety</label>
    <select name="grape_variety_id" class="form-select form-select-sm" style="min-width:140px">
      <option value="">All</option>
      {% for g in grape_varieties %}
      <option value="{{ g.id }}">{{ g.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">AVA</label>
    <select name="ava_id" class="form-select form-select-sm" style="min-width:160px">
      <option value="">All</option>
      {% for a in all_avas %}
      <option value="{{ a.id }}">{{ a.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <button type="button" class="btn btn-outline-secondary btn-sm"
            onclick="this.form.reset(); htmx.trigger(this.form, 'input');">Clear</button>
  </div>
</form>

<div id="wine-table-wrap">
  {% include "wines/_table.html" %}
</div>
{% endblock %}
