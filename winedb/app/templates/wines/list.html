{% extends "base.html" %}
{% block title %}Wines{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Wines</h2>
  <button class="btn btn-primary btn-sm"
          hx-get="/ui/wines/modal/new"
          hx-target="#modal-container"
          hx-swap="innerHTML">+ New</button>
</div>

<table class="table table-hover table-sm align-middle">
  <thead>
    <tr>
      <th>Label</th>
      <th>Vintage</th>
      <th>Winery</th>
      <th>AVA</th>
      <th>Grape Variety</th>
      <th>Alcohol</th>
      <th>Vineyards</th>
      <th style="width:130px"></th>
    </tr>
  </thead>
  <tbody id="wine-tbody">
    {% for item in items %}
      {% include "partials/table_row_wine.html" %}
    {% endfor %}
  </tbody>
</table>
{% if not items %}
<p class="text-muted">No wines found.</p>
{% endif %}
{% endblock %}
