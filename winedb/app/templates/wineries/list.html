{% extends "base.html" %}
{% block title %}Wineries{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Wineries</h2>
  <button class="btn btn-primary btn-sm"
          hx-get="/ui/wineries/modal/new"
          hx-target="#modal-container"
          hx-swap="innerHTML">+ New</button>
</div>

<table class="table table-hover table-sm align-middle">
  <thead>
    <tr>
      <th>Name</th>
      <th>Location</th>
      <th>AVA</th>
      <th>Est. Year</th>
      <th>Negociant</th>
      <th style="width:130px"></th>
    </tr>
  </thead>
  <tbody id="winery-tbody">
    {% for item in items %}
      {% include "partials/table_row_winery.html" %}
    {% endfor %}
  </tbody>
</table>
{% if not items %}
<p class="text-muted">No wineries found.</p>
{% endif %}
{% endblock %}
