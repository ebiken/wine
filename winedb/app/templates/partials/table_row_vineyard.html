<tr id="vineyard-row-{{ item.id }}">
  <td>{{ item.name }}</td>
  <td>
    {% for a in all_avas %}{% if a.id == item.ava_id %}{{ a.name }}{% endif %}{% endfor %}
  </td>
  <td>{{ item.total_acres or "—" }}</td>
  <td>{{ item.established_year or "—" }}</td>
  <td>{{ item.soil_type or "—" }}</td>
  <td>
    <button class="btn btn-sm btn-outline-secondary"
            hx-get="/ui/vineyards/modal/{{ item.id }}"
            hx-target="#modal-container"
            hx-swap="innerHTML">Edit</button>
    <button class="btn btn-sm btn-outline-danger"
            hx-delete="/ui/vineyards/{{ item.id }}"
            hx-target="#vineyard-row-{{ item.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete '{{ item.name }}'?">Del</button>
  </td>
</tr>
