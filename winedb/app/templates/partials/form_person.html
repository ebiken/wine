<div class="modal fade show d-block" tabindex="-1" id="entity-modal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ "Edit" if item else "New" }} Person</h5>
        <button type="button" class="btn-close"
                onclick="document.getElementById('modal-container').innerHTML=''"></button>
      </div>
      <div class="modal-body">
        {% if errors.__all__ is defined %}
        <div class="alert alert-danger py-2">{{ errors.__all__ }}</div>
        {% endif %}
        <form id="person-form"
              {% if item %}
              hx-post="/ui/persons/{{ item.id }}/edit"
              hx-target="#person-row-{{ item.id }}"
              hx-swap="outerHTML"
              {% else %}
              hx-post="/ui/persons"
              hx-target="#person-tbody"
              hx-swap="afterbegin"
              {% endif %}
              hx-on::after-request="if(event.detail.successful) document.getElementById('modal-container').innerHTML=''">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
              <input name="first_name" class="form-control {% if errors.first_name is defined %}is-invalid{% endif %}"
                     value="{{ item.first_name if item else '' }}" required>
              {% if errors.first_name is defined %}<div class="invalid-feedback">{{ errors.first_name }}</div>{% endif %}
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
              <input name="last_name" class="form-control {% if errors.last_name is defined %}is-invalid{% endif %}"
                     value="{{ item.last_name if item else '' }}" required>
              {% if errors.last_name is defined %}<div class="invalid-feedback">{{ errors.last_name }}</div>{% endif %}
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Birth Year</label>
              <input name="birth_year" type="number" class="form-control"
                     value="{{ item.birth_year if item else '' }}" min="1900" max="2010">
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Nationality</label>
              <input name="nationality" class="form-control"
                     value="{{ item.nationality if item else '' }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Biography</label>
              <textarea name="biography" class="form-control" rows="4">{{ item.biography if item else '' }}</textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary"
                onclick="document.getElementById('modal-container').innerHTML=''">Cancel</button>
        <button type="submit" form="person-form" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show"></div>
