{% extends "base.html" %}
{% block title %}Vineyards{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Vineyards</h2>
  <button class="btn btn-primary btn-sm"
          hx-get="/ui/vineyards/modal/new"
          hx-target="#modal-container"
          hx-swap="innerHTML">+ New</button>
</div>

<form id="vineyard-filter-form"
      hx-get="/ui/vineyards/rows"
      hx-target="#vineyard-table-wrap"
      hx-trigger="input delay:300ms"
      class="row g-2 mb-3 align-items-end">
  <input type="hidden" id="vineyard-sort-by"  name="sort_by"  value="{{ sort_by }}">
  <input type="hidden" id="vineyard-sort-dir" name="sort_dir" value="{{ sort_dir }}">
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Name</label>
    <input type="text" name="name" class="form-control form-control-sm" placeholder="Search…" style="min-width:140px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">AVA</label>
    <select name="ava_id" class="form-select form-select-sm" style="min-width:160px">
      <option value="">All</option>
      {% for a in all_avas %}
      <option value="{{ a.id }}">{{ a.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Est. Year</label>
    <input type="number" name="established_year" class="form-control form-control-sm" placeholder="e.g. 1990" style="width:100px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Soil Type</label>
    <input type="text" name="soil_type" class="form-control form-control-sm" placeholder="Search…" style="min-width:120px">
  </div>
  <div class="col-auto">
    <button type="button" class="btn btn-outline-secondary btn-sm"
            onclick="this.form.reset(); htmx.trigger(this.form, 'input');">Clear</button>
  </div>
</form>

<div id="vineyard-table-wrap">
  {% include "vineyards/_table.html" %}
</div>
{% endblock %}
