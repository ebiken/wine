{% extends "base.html" %}
{% block title %}Persons{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Persons</h2>
  <button class="btn btn-primary btn-sm"
          hx-get="/ui/persons/modal/new"
          hx-target="#modal-container"
          hx-swap="innerHTML">+ New</button>
</div>

<form id="person-filter-form"
      hx-get="/ui/persons/rows"
      hx-target="#person-table-wrap"
      hx-trigger="input delay:300ms"
      class="row g-2 mb-3 align-items-end">
  <input type="hidden" id="person-sort-by"  name="sort_by"  value="{{ sort_by }}">
  <input type="hidden" id="person-sort-dir" name="sort_dir" value="{{ sort_dir }}">
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Name</label>
    <input type="text" name="search" class="form-control form-control-sm" placeholder="Search…" style="min-width:160px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Birth Year</label>
    <input type="number" name="birth_year" class="form-control form-control-sm" placeholder="e.g. 1960" style="width:100px">
  </div>
  <div class="col-auto">
    <label class="form-label form-label-sm mb-1">Nationality</label>
    <input type="text" name="nationality" class="form-control form-control-sm" placeholder="Search…" style="min-width:120px">
  </div>
  <div class="col-auto">
    <button type="button" class="btn btn-outline-secondary btn-sm"
            onclick="this.form.reset(); htmx.trigger(this.form, 'input');">Clear</button>
  </div>
</form>

<div id="person-table-wrap">
  {% include "persons/_table.html" %}
</div>
{% endblock %}
